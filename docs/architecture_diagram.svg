<svg width="100%" viewBox="0 0 850 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="db-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Neon Accent Gradients -->
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D9488" />
      <stop offset="100%" stop-color="#14B8A6" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#60A5FA" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#A78BFA" />
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C69B3C" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#0D9488" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2563EB" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#7C3AED" />
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#475569" />
    </marker>

    <!-- Drop Shadows and Glows -->
    <filter id="glow-teal" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="3" stdDeviation="3" flood-opacity="0.5" flood-color="#020617"/>
    </filter>
  </defs>

  <style>
    .text-title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 800; letter-spacing: 0.5px; fill: #F8FAFC; }
    .text-subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 11px; fill: #94A3B8; }
    .text-section-title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 800; letter-spacing: 1px; }
    .text-box-title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 700; fill: #E2E8F0; }
    .text-box-sub { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 9px; fill: #94A3B8; }
    .text-db-title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 800; fill: #FFFFFF; letter-spacing: 0.5px; }
    .text-db-sub { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 9px; fill: #94A3B8; }
    .text-output { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 800; letter-spacing: 0.5px; }
    .line-flow { fill: none; stroke-linecap: round; }
  </style>

  <!-- Deep Midnight Canvas Background -->
  <rect width="100%" height="100%" fill="#0B0F19" rx="10" />

  <!-- Header Line Decorator -->
  <rect x="0" y="0" width="850" height="4" fill="url(#gold-grad)" />

  <!-- Title & Metadata -->
  <text class="text-title" x="35" y="42">NEXORIA COMMERCE INC.</text>
  <text class="text-title" x="250" y="42" fill="#C69B3C">|</text>
  <text class="text-title" x="270" y="42" font-weight="300" fill="#94A3B8">FINANCE SYSTEMS ARCHITECTURE</text>
  <text class="text-subtitle" x="35" y="60">Relational data warehouse feeding parallel Operations, Analytics, and Strategy automation pipelines.</text>

  <!-- ==================== 1. DATA LAYER (Top Row) ==================== -->
  <g filter="url(#shadow)">
    <rect x="35" y="85" width="780" height="55" rx="6" fill="url(#db-grad)" stroke="#334155" stroke-width="1" />
    <rect x="35" y="85" width="780" height="2" fill="url(#gold-grad)" />
    <text class="text-db-title" x="425" y="108" text-anchor="middle">RELATIONAL DATA WAREHOUSE LAYER (SQLite — nexoria.db)</text>
    <text class="text-db-sub" x="425" y="123" text-anchor="middle">orders (32K+ rows) · customers · products · state_tax_rates · shipments · gl_journal_entries · budget · actuals</text>
  </g>

  <!-- Flow lines from Database to Columns -->
  <path class="line-flow" stroke="#475569" d="M 162 140 L 162 170" marker-end="url(#arrow-grey)" />
  <path class="line-flow" stroke="#475569" d="M 425 140 L 425 170" marker-end="url(#arrow-grey)" />
  <path class="line-flow" stroke="#475569" d="M 688 140 L 688 170" marker-end="url(#arrow-grey)" />

  <!-- ==================== COLUMN 1: OPERATIONS (TEAL) ==================== -->
  <text class="text-section-title" fill="#14B8A6" x="50" y="163">AUTOMATED OPERATIONS</text>
  
  <!-- Outer Column Bounding Box -->
  <rect x="35" y="172" width="244" height="200" rx="6" fill="#0F172A" fill-opacity="0.3" stroke="#1E293B" stroke-width="1" />

  <!-- Module 1 -->
  <g filter="url(#shadow)">
    <rect x="47" y="184" width="220" height="46" rx="4" fill="#131A2A" stroke="#334155" stroke-width="1" />
    <rect x="47" y="184" width="4" height="46" fill="url(#teal-grad)" />
    <text class="text-box-title" x="65" y="202">01. Invoice Automation</text>
    <text class="text-box-sub" x="65" y="217">Excel VBA &amp; Python ReportLab engines</text>
  </g>
  <path class="line-flow" stroke="#334155" d="M 157 230 L 157 242" />

  <!-- Module 2 -->
  <g filter="url(#shadow)">
    <rect x="47" y="242" width="220" height="46" rx="4" fill="#131A2A" stroke="#334155" stroke-width="1" />
    <rect x="47" y="242" width="4" height="46" fill="url(#teal-grad)" />
    <text class="text-box-title" x="65" y="260">02. Multi-State Sales Tax</text>
    <text class="text-box-sub" x="65" y="275">Power Query multi-state category exemptions</text>
  </g>
  <path class="line-flow" stroke="#334155" d="M 157 288 L 157 300" />

  <!-- Module 3 -->
  <g filter="url(#shadow)">
    <rect x="47" y="300" width="220" height="46" rx="4" fill="#131A2A" stroke="#334155" stroke-width="1" />
    <rect x="47" y="300" width="4" height="46" fill="url(#teal-grad)" />
    <text class="text-box-title" x="65" y="318">03. Shipping Cost Allocator</text>
    <text class="text-box-sub" x="65" y="333">Weighted allocation algorithm via Python Pandas</text>
  </g>
  <path class="line-flow" stroke="#0D9488" d="M 157 346 L 157 395" marker-end="url(#arrow-teal)" />

  <!-- ==================== COLUMN 2: FP&A & ANALYTICS (BLUE) ==================== -->
  <text class="text-section-title" fill="#3B82F6" x="313" y="163">FP&amp;A &amp; VISIBILITY</text>
  
  <!-- Outer Column Bounding Box -->
  <rect x="298" y="172" width="244" height="200" rx="6" fill="#0F172A" fill-opacity="0.3" stroke="#1E293B" stroke-width="1" />

  <!-- Module 4 -->
  <g filter="url(#shadow)">
    <rect x="310" y="184" width="220" height="46" rx="4" fill="#131A2A" stroke="#334155" stroke-width="1" />
    <rect x="310" y="184" width="4" height="46" fill="url(#blue-grad)" />
    <text class="text-box-title" x="328" y="202">04. Budget vs. Actual Dashboard</text>
    <text class="text-box-sub" x="328" y="217">Power BI 2-page star-schema model</text>
  </g>
  <path class="line-flow" stroke="#334155" d="M 420 230 L 420 242" />

  <!-- Module 5 -->
  <g filter="url(#shadow)">
    <rect x="310" y="242" width="220" height="46" rx="4" fill="#131A2A" stroke="#334155" stroke-width="1" />
    <rect x="310" y="242" width="4" height="46" fill="url(#blue-grad)" />
    <text class="text-box-title" x="328" y="260">05. P&amp;L Report Automation</text>
    <text class="text-box-sub" x="328" y="275">openpyxl &amp; Windows COM month slicer</text>
  </g>
  <path class="line-flow" stroke="#334155" d="M 420 288 L 420 300" />

  <!-- Module 6 -->
  <g filter="url(#shadow)">
    <rect x="310" y="300" width="220" height="46" rx="4" fill="#131A2A" stroke="#334155" stroke-width="1" />
    <rect x="310" y="300" width="4" height="46" fill="url(#blue-grad)" />
    <text class="text-box-title" x="328" y="318">06. AR Aging Report</text>
    <text class="text-box-sub" x="328" y="333">Color-coded warning bucket pivot sheets</text>
  </g>
  <path class="line-flow" stroke="#2563EB" d="M 420 346 L 420 395" marker-end="url(#arrow-blue)" />

  <!-- ==================== COLUMN 3: STRATEGY (PURPLE) ==================== -->
  <text class="text-section-title" fill="#A78BFA" x="575" y="163">FORECASTS &amp; CLOUD PIPELINES</text>
  
  <!-- Outer Column Bounding Box -->
  <rect x="560" y="172" width="244" height="200" rx="6" fill="#0F172A" fill-opacity="0.3" stroke="#1E293B" stroke-width="1" />

  <!-- Module 7 -->
  <g filter="url(#shadow)">
    <rect x="572" y="184" width="220" height="46" rx="4" fill="#131A2A" stroke="#334155" stroke-width="1" />
    <rect x="572" y="184" width="4" height="46" fill="url(#purple-grad)" />
    <text class="text-box-title" x="590" y="202">07. Revenue Forecasting</text>
    <text class="text-box-sub" x="590" y="217">statsmodels SARIMA forecasting engine</text>
  </g>
  <path class="line-flow" stroke="#334155" d="M 682 230 L 682 242" />

  <!-- Module 8 -->
  <g filter="url(#shadow)">
    <rect x="572" y="242" width="220" height="46" rx="4" fill="#131A2A" stroke="#334155" stroke-width="1" />
    <rect x="572" y="242" width="4" height="46" fill="url(#purple-grad)" />
    <text class="text-box-title" x="590" y="260">08. Quote-to-Invoice Pipeline</text>
    <text class="text-box-sub" x="590" y="275">Google Apps Script Drive &amp; Gmail flow</text>
  </g>
  <path class="line-flow" stroke="#334155" d="M 682 288 L 682 300" />

  <!-- Module 9 -->
  <g filter="url(#shadow)">
    <rect x="572" y="300" width="220" height="46" rx="4" fill="#131A2A" stroke="#334155" stroke-width="1" />
    <rect x="572" y="300" width="4" height="46" fill="url(#purple-grad)" />
    <text class="text-box-title" x="590" y="318">09. Case Study &amp; Proposal</text>
    <text class="text-box-sub" x="590" y="333">ReportLab PDF compiler &amp; Upwork pack</text>
  </g>
  <path class="line-flow" stroke="#7C3AED" d="M 682 346 L 682 395" marker-end="url(#arrow-purple)" />

  <!-- ==================== DELIVERABLES (BOTTOM ROW) ==================== -->
  
  <!-- Output 1 -->
  <g filter="url(#shadow)">
    <rect x="35" y="400" width="244" height="34" rx="4" fill="#0D9488" fill-opacity="0.1" stroke="#0D9488" stroke-width="1" />
    <text class="text-output" fill="#14B8A6" x="157" y="421" text-anchor="middle">Branded PDF Invoices &amp; Run Logs</text>
  </g>

  <!-- Output 2 -->
  <g filter="url(#shadow)">
    <rect x="298" y="400" width="244" height="34" rx="4" fill="#2563EB" fill-opacity="0.1" stroke="#2563EB" stroke-width="1" />
    <text class="text-output" fill="#3B82F6" x="420" y="421" text-anchor="middle">Automated P&amp;L, AR &amp; Tax Workbooks</text>
  </g>

  <!-- Output 3 -->
  <g filter="url(#shadow)">
    <rect x="560" y="400" width="244" height="34" rx="4" fill="#7C3AED" fill-opacity="0.1" stroke="#7C3AED" stroke-width="1" />
    <text class="text-output" fill="#A78BFA" x="682" y="421" text-anchor="middle">Power BI Dashboards &amp; Forecasts</text>
  </g>

  <!-- Footer Decorator -->
  <rect x="0" y="496" width="850" height="4" fill="url(#gold-grad)" />

</svg>
