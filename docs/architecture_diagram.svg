<svg width="100%" viewBox="0 0 950 950" xmlns="http://www.w3.org/2000/svg">
  <!-- Warm Cream Background -->
  <rect width="100%" height="100%" fill="#F8F7F3" rx="12" />

  <style>
    .title-main { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 26px; font-weight: 800; fill: #0F1D36; letter-spacing: 0.5px; }
    .title-sub { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 13px; fill: #5A6B82; }
    .card-title { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 800; fill: #0F1D36; letter-spacing: 0.5px; }
    .card-text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 10.5px; fill: #5A6B82; line-height: 14px; }
    .db-title { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 800; fill: #FFFFFF; letter-spacing: 0.5px; }
    .db-text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 10px; fill: #A5C0DD; }
    .label-flow { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 700; fill: #5A6B82; }
    .line-arrow { fill: none; stroke: #0F1D36; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <defs>
    <!-- Arrowhead Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 Z" fill="#0F1D36" />
    </marker>
    <!-- Gold Gradient for Icons -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
  </defs>

  <!-- ==================== HEADER SECTION ==================== -->
  <g transform="translate(0, 0)">
    <text class="title-main" x="475" y="55" text-anchor="middle">FINANCIAL DATA AUTOMATION PIPELINE</text>
    <text class="title-sub" x="475" y="80" text-anchor="middle">Relational database warehouse layer feeding parallel Operations, FP&amp;A, and Cloud Forecasting modules.</text>
  </g>

  <!-- ==================== TOP ROW: OPERATIONS & CLOUD (INPUTS) ==================== -->
  
  <!-- Module 08: Quote-to-Invoice GAS Pipeline -->
  <g transform="translate(60, 120)">
    <rect x="0" y="0" width="190" height="110" rx="8" fill="#FFFFFF" stroke="#0F1D36" stroke-width="2" />
    <!-- Google Cloud/GAS Icon (Gold) -->
    <path d="M 25 28 C 25 18, 38 18, 42 22 C 45 18, 58 18, 58 28 C 64 28, 68 34, 63 39 C 68 44, 60 52, 54 48 C 50 52, 33 52, 29 48 C 23 48, 20 42, 25 37 C 20 34, 20 28, 25 28 Z" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
    <path d="M 33 34 L 50 34" stroke="url(#gold-grad)" stroke-width="2"/>
    <path d="M 33 40 L 45 40" stroke="url(#gold-grad)" stroke-width="2"/>
    <text class="card-title" x="95" y="72" text-anchor="middle">QUOTE PIPELINE (08)</text>
    <text class="card-text" x="95" y="87" text-anchor="middle">Google Apps Script</text>
    <text class="card-text" x="95" y="99" text-anchor="middle">Quote-to-Invoice Flow</text>
  </g>

  <!-- Module 01: Invoicing Module -->
  <g transform="translate(280, 120)">
    <rect x="0" y="0" width="190" height="110" rx="8" fill="#FFFFFF" stroke="#0F1D36" stroke-width="2" />
    <!-- Document Icon (Gold) -->
    <path d="M 28 22 L 44 22 L 52 30 L 52 48 L 28 48 Z" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
    <path d="M 44 22 L 44 30 L 52 30" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
    <path d="M 34 36 L 46 36" stroke="url(#gold-grad)" stroke-width="1.5" />
    <path d="M 34 42 L 40 42" stroke="url(#gold-grad)" stroke-width="1.5" />
    <!-- Dollar sign in circle -->
    <circle cx="45" cy="42" r="5" fill="none" stroke="url(#gold-grad)" stroke-width="1" />
    <text class="card-title" x="95" y="72" text-anchor="middle">INVOICING MODULE (01)</text>
    <text class="card-text" x="95" y="87" text-anchor="middle">Excel VBA &amp; Python PDF</text>
    <text class="card-text" x="95" y="99" text-anchor="middle">Branded Invoice Engine</text>
  </g>

  <!-- Module 02: Sales Tax Module -->
  <g transform="translate(500, 120)">
    <rect x="0" y="0" width="190" height="110" rx="8" fill="#FFFFFF" stroke="#0F1D36" stroke-width="2" />
    <!-- Calculator Icon (Gold) -->
    <rect x="30" y="22" width="22" height="26" rx="2" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
    <rect x="34" y="26" width="14" height="6" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" />
    <circle cx="36" cy="37" r="1.5" fill="url(#gold-grad)" />
    <circle cx="42" cy="37" r="1.5" fill="url(#gold-grad)" />
    <circle cx="48" cy="37" r="1.5" fill="url(#gold-grad)" />
    <circle cx="36" cy="43" r="1.5" fill="url(#gold-grad)" />
    <circle cx="42" cy="43" r="1.5" fill="url(#gold-grad)" />
    <circle cx="48" cy="43" r="1.5" fill="url(#gold-grad)" />
    <text class="card-title" x="95" y="72" text-anchor="middle">SALES TAX ENGINE (02)</text>
    <text class="card-text" x="95" y="87" text-anchor="middle">Power Query &amp; M</text>
    <text class="card-text" x="95" y="99" text-anchor="middle">State Rate Tax Matrix</text>
  </g>

  <!-- Module 03: Shipping Module -->
  <g transform="translate(720, 120)">
    <rect x="0" y="0" width="190" height="110" rx="8" fill="#FFFFFF" stroke="#0F1D36" stroke-width="2" />
    <!-- Shipping Truck/Box Icon (Gold) -->
    <path d="M 28 32 L 44 32 L 44 44 L 28 44 Z" fill="none" stroke="url(#gold-grad)" stroke-width="2"/>
    <path d="M 44 36 L 50 36 L 54 40 L 54 44 L 44 44 Z" fill="none" stroke="url(#gold-grad)" stroke-width="1.5"/>
    <circle cx="33" cy="47" r="3" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" />
    <circle cx="49" cy="47" r="3" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" />
    <rect x="32" y="24" width="8" height="8" fill="none" stroke="url(#gold-grad)" stroke-width="1"/>
    <text class="card-title" x="95" y="72" text-anchor="middle">SHIPPING ALLOCATOR (03)</text>
    <text class="card-text" x="95" y="87" text-anchor="middle">Python Pandas Engine</text>
    <text class="card-text" x="95" y="99" text-anchor="middle">Freight Cost Allocations</text>
  </g>

  <!-- Connecting Line: Quote Pipeline to Invoicing Module -->
  <path class="line-arrow" d="M 250 175 L 280 175" marker-end="url(#arrow)" />

  <!-- ==================== CENTER SECTION: DATABASE ==================== -->
  
  <!-- Central SQLite Database Cylinder -->
  <g transform="translate(415, 380)">
    <ellipse cx="60" cy="20" rx="55" ry="18" fill="#1D2D44" stroke="#FFFFFF" stroke-width="2" />
    <path d="M 5 20 L 5 80 A 55 18 0 0 0 115 80 L 115 20" fill="#1D2D44" stroke="#FFFFFF" stroke-width="2" />
    <path d="M 5 50 A 55 18 0 0 0 115 50" fill="none" stroke="#FFFFFF" stroke-dasharray="3,3" stroke-width="1.5" />
    
    <!-- Gold Table Schema Graphic inside DB -->
    <circle cx="35" cy="40" r="4" fill="url(#gold-grad)" />
    <line x1="39" y1="40" x2="60" y2="40" stroke="url(#gold-grad)" stroke-width="1.5" />
    <line x1="60" y1="40" x2="60" y2="60" stroke="url(#gold-grad)" stroke-width="1.5" />
    <circle cx="60" cy="64" r="3" fill="url(#gold-grad)" />
    <line x1="39" y1="40" x2="80" y2="40" stroke="url(#gold-grad)" stroke-width="1.5" />
    <circle cx="84" cy="40" r="3" fill="url(#gold-grad)" />

    <text class="db-title" x="60" y="98" text-anchor="middle">CENTRAL SQLITE DATABASE</text>
    <text class="db-text" x="60" y="112" text-anchor="middle">nexoria.db</text>
    <text class="db-text" x="60" y="124" text-anchor="middle">10 Tables / 32K+ Rows</text>
  </g>

  <!-- Flow Lines: Top Modules to Database -->
  
  <!-- From Invoicing (01) -->
  <path class="line-arrow" d="M 375 230 L 375 350 L 440 380" marker-end="url(#arrow)" />
  <text class="label-flow" x="335" y="275" text-anchor="middle">Input</text>
  <text class="label-flow" x="335" y="325" text-anchor="middle">Output</text>
  <path class="line-arrow" d="M 430 380 L 360 350 L 360 230" marker-end="url(#arrow)" />

  <!-- From Sales Tax (02) -->
  <path class="line-arrow" d="M 485 230 L 485 365" marker-end="url(#arrow)" />
  <path class="line-arrow" d="M 465 365 L 465 230" marker-end="url(#arrow)" />
  <text class="label-flow" x="440" y="290" text-anchor="middle">Process</text>
  <text class="label-flow" x="510" y="290" text-anchor="middle">Output</text>

  <!-- From Shipping (03) -->
  <path class="line-arrow" d="M 815 230 L 815 350 L 540 380" marker-end="url(#arrow)" />
  <path class="line-arrow" d="M 530 380 L 800 350 L 800 230" marker-end="url(#arrow)" />
  <text class="label-flow" x="835" y="275" text-anchor="middle">Input</text>
  <text class="label-flow" x="835" y="325" text-anchor="middle">Output</text>

  <!-- ==================== MIDDLE ROW: INTERMEDIATE OUTPUTS ==================== -->

  <!-- Left: PDF Invoices Deliverable -->
  <g transform="translate(100, 395)">
    <!-- Gold PDF Icon -->
    <path d="M 15 8 L 30 8 L 36 14 L 36 30 L 15 30 Z" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
    <path d="M 18 18 H 33 M 18 24 H 26" stroke="url(#gold-grad)" stroke-width="1.5" />
    <text class="card-title" x="48" y="16">PDF INVOICES</text>
    <text class="card-text" x="48" y="28">Formal Customer PDFs</text>
    <text class="card-text" x="48" y="38">Automation Audit Logs</text>
  </g>
  <path class="line-arrow" d="M 410 440 L 305 440" marker-end="url(#arrow)" />

  <!-- Right: Reconciled CSVs Deliverable -->
  <g transform="translate(635, 395)">
    <!-- Gold Excel Grid Checkmark Icon -->
    <rect x="10" y="8" width="22" height="22" rx="2" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
    <path d="M 15 15 H 27 M 15 22 H 27 M 20 8 V 30" stroke="url(#gold-grad)" stroke-width="1.5"/>
    <circle cx="28" cy="26" r="5" fill="#F8F7F3" stroke="url(#gold-grad)" stroke-width="1" />
    <path d="M 26 26 L 27.5 27.5 L 30 24.5" fill="none" stroke="url(#gold-grad)" stroke-width="1" />
    <text class="card-title" x="45" y="16">RECONCILED CSVs</text>
    <text class="card-text" x="45" y="28">Transaction Tax Logs</text>
    <text class="card-text" x="45" y="38">Carrier Freight Audits</text>
  </g>
  <path class="line-arrow" d="M 540 440 L 625 440" marker-end="url(#arrow)" />

  <!-- ==================== BOTTOM ROW: FP&A & STRATEGY (DELIVERABLES) ==================== -->

  <!-- Flow Lines from Database to Bottom Row -->
  <path class="line-flow" d="M 475 530 L 475 630" />
  
  <!-- Horizontal Bus Line -->
  <path class="line-flow" d="M 155 630 L 795 630" />
  
  <!-- Drop arrows from Bus to Bottom Cards -->
  <path class="line-arrow" d="M 155 630 L 155 690" marker-end="url(#arrow)" />
  <path class="line-arrow" d="M 370 630 L 370 690" marker-end="url(#arrow)" />
  <path class="line-arrow" d="M 580 630 L 580 690" marker-end="url(#arrow)" />
  <path class="line-arrow" d="M 790 630 L 790 690" marker-end="url(#arrow)" />

  <!-- Card 04: Power BI Dashboard -->
  <g transform="translate(60, 700)">
    <rect x="0" y="0" width="190" height="130" rx="8" fill="#FFFFFF" stroke="#0F1D36" stroke-width="2" />
    <!-- Gold Dashboard Monitor Icon -->
    <rect x="75" y="20" width="40" height="26" rx="2" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
    <path d="M 85 46 L 81 52 H 109 L 105 46 Z" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
    <rect x="80" y="25" width="8" height="16" fill="url(#gold-grad)" />
    <rect x="91" y="31" width="8" height="10" fill="url(#gold-grad)" />
    <rect x="102" y="27" width="8" height="14" fill="url(#gold-grad)" />
    <text class="card-title" x="95" y="75" text-anchor="middle">POWER BI DASHBOARD (04)</text>
    <text class="card-text" x="95" y="94" text-anchor="middle">Real-time Visualizations</text>
    <text class="card-text" x="95" y="108" text-anchor="middle">Star-Schema FP&amp;A KPIs</text>
  </g>

  <!-- Card 05: Profit & Loss (P&L) Automation -->
  <g transform="translate(275, 700)">
    <rect x="0" y="0" width="190" height="130" rx="8" fill="#FFFFFF" stroke="#0F1D36" stroke-width="2" />
    <!-- Gold Line Trend Chart Icon -->
    <path d="M 75 52 V 22 H 115" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
    <path d="M 75 48 L 88 35 L 100 42 L 115 25" fill="none" stroke="url(#gold-grad)" stroke-width="2.5" />
    <circle cx="115" cy="25" r="2" fill="url(#gold-grad)" />
    <text class="card-title" x="95" y="75" text-anchor="middle">PROFIT &amp; LOSS P&amp;L (05)</text>
    <text class="card-text" x="95" y="94" text-anchor="middle">Income Statement Gen</text>
    <text class="card-text" x="95" y="108" text-anchor="middle">openpyxl &amp; COM Automation</text>
  </g>

  <!-- Card 06: AR Aging Validation -->
  <g transform="translate(485, 700)">
    <rect x="0" y="0" width="190" height="130" rx="8" fill="#FFFFFF" stroke="#0F1D36" stroke-width="2" />
    <!-- Gold Hourglass & Clock Icon -->
    <path d="M 83 22 H 107 M 85 22 L 91 32 A 4 4 0 0 1 91 36 L 85 46 M 105 22 L 99 32 A 4 4 0 0 0 99 36 L 105 46 M 83 46 H 107" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
    <circle cx="106" cy="44" r="7" fill="#FFFFFF" stroke="url(#gold-grad)" stroke-width="1.5" />
    <path d="M 106 40 V 44 L 109 46" fill="none" stroke="url(#gold-grad)" stroke-width="1" />
    <text class="card-title" x="95" y="75" text-anchor="middle">AR AGING REPORT (06)</text>
    <text class="card-text" x="95" y="94" text-anchor="middle">Accounts Receivable</text>
    <text class="card-text" x="95" y="108" text-anchor="middle">Overdue Invoices warning</text>
  </g>

  <!-- Card 07: Revenue Forecasting -->
  <g transform="translate(695, 700)">
    <rect x="0" y="0" width="190" height="130" rx="8" fill="#FFFFFF" stroke="#0F1D36" stroke-width="2" />
    <!-- Gold Forecasting Chart/Magic Ball Icon -->
    <path d="M 75 42 Q 95 18 115 42" fill="none" stroke="url(#gold-grad)" stroke-width="2" stroke-dasharray="2,2" />
    <circle cx="95" cy="30" r="10" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
    <circle cx="95" cy="30" r="3" fill="url(#gold-grad)" />
    <line x1="91" y1="46" x2="83" y2="52" stroke="url(#gold-grad)" stroke-width="2" />
    <line x1="99" y1="46" x2="107" y2="52" stroke="url(#gold-grad)" stroke-width="2" />
    <text class="card-title" x="95" y="75" text-anchor="middle">FORECASTING ENGINE (07)</text>
    <text class="card-text" x="95" y="94" text-anchor="middle">statsmodels SARIMA model</text>
    <text class="card-text" x="95" y="108" text-anchor="middle">Predictive Cash Flow</text>
  </g>

  <!-- Floating Module 09: Case Study Compiler -->
  <g transform="translate(720, 15)">
    <rect x="0" y="0" width="190" height="75" rx="8" fill="#FFFFFF" stroke="#0F1D36" stroke-width="2" />
    <!-- Document Compiler Icon -->
    <path d="M 20 18 H 36 L 42 24 V 44 H 20 Z" fill="none" stroke="url(#gold-grad)" stroke-width="1.5"/>
    <path d="M 24 12 H 44 L 50 18 V 38 H 45" fill="none" stroke="url(#gold-grad)" stroke-width="1"/>
    <text class="card-title" x="105" y="32">CASE STUDY PACK (09)</text>
    <text class="card-text" x="105" y="47">ReportLab PDF Compiler</text>
    <text class="card-text" x="105" y="59">Case study &amp; Upwork kits</text>
  </g>

</svg>
