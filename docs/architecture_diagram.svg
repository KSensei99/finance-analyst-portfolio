<svg width="100%" viewBox="0 0 850 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrow marker -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#3B82F6" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#10B981" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#8B5CF6" />
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#94A3B8" />
    </marker>
    <!-- Drop Shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1" flood-color="#0F172A"/>
    </filter>
  </defs>

  <style>
    .text-title { font-family: 'Segoe UI', Calibri, Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #0F172A; }
    .text-subtitle { font-family: 'Segoe UI', Calibri, Arial, sans-serif; font-size: 11px; fill: #64748B; }
    .text-section-title { font-family: 'Segoe UI', Calibri, Arial, sans-serif; font-size: 11px; font-weight: bold; letter-spacing: 0.5px; }
    .text-box-title { font-family: 'Segoe UI', Calibri, Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #1E293B; }
    .text-box-sub { font-family: 'Segoe UI', Calibri, Arial, sans-serif; font-size: 9px; fill: #64748B; }
    .text-db-title { font-family: 'Segoe UI', Calibri, Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #FFFFFF; }
    .text-db-sub { font-family: 'Segoe UI', Calibri, Arial, sans-serif; font-size: 9px; fill: #CBD5E1; }
    .text-output { font-family: 'Segoe UI', Calibri, Arial, sans-serif; font-size: 10px; font-weight: bold; }
    .line-arrow { stroke-width: 1.25; fill: none; }
  </style>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#F8FAFC" rx="12" />

  <!-- Title & Metadata -->
  <text class="text-title" x="30" y="40">Nexoria Commerce Inc. — Finance Automation Architecture</text>
  <text class="text-subtitle" x="30" y="58">Central SQLite Data Warehouse feeding three parallel automation pipelines to produce integrated deliverables.</text>

  <!-- 1. DATA LAYER (Top Row) -->
  <g filter="url(#shadow)">
    <rect x="30" y="85" width="790" height="55" rx="8" fill="#0F172A" />
    <text class="text-db-title" x="425" y="108" text-anchor="middle">Relational Data Warehouse Layer (SQLite — nexoria.db)</text>
    <text class="text-db-sub" x="425" y="123" text-anchor="middle">orders (32K+ rows) · customers · products · state_tax_rates · shipments · gl_journal_entries · budget · actuals</text>
  </g>

  <!-- Trunk arrows from Data Layer to Modules -->
  <path class="line-arrow" stroke="#94A3B8" d="M 160 140 L 160 175" marker-end="url(#arrow-grey)" />
  <path class="line-arrow" stroke="#94A3B8" d="M 425 140 L 425 175" marker-end="url(#arrow-grey)" />
  <path class="line-arrow" stroke="#94A3B8" d="M 690 140 L 690 175" marker-end="url(#arrow-grey)" />

  <!-- ==================== COLUMN 1: OPERATIONS (TEAL) ==================== -->
  <text class="text-section-title" fill="#0D9488" x="50" y="165">AUTOMATED OPERATIONS</text>
  
  <!-- Module 1 -->
  <g filter="url(#shadow)">
    <rect x="50" y="175" width="220" height="50" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
    <rect x="50" y="175" width="6" height="50" fill="#0D9488" rx="2" />
    <text class="text-box-title" x="70" y="195">01. Invoice Automation</text>
    <text class="text-box-sub" x="70" y="210">Excel VBA macro &amp; Python ReportLab engines</text>
  </g>
  <path class="line-arrow" stroke="#CBD5E1" d="M 160 225 L 160 240" />

  <!-- Module 2 -->
  <g filter="url(#shadow)">
    <rect x="50" y="240" width="220" height="50" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
    <rect x="50" y="240" width="6" height="50" fill="#0D9488" rx="2" />
    <text class="text-box-title" x="70" y="260">02. Multi-State Sales Tax</text>
    <text class="text-box-sub" x="70" y="275">Power Query multi-state category exemptions</text>
  </g>
  <path class="line-arrow" stroke="#CBD5E1" d="M 160 290 L 160 305" />

  <!-- Module 3 -->
  <g filter="url(#shadow)">
    <rect x="50" y="305" width="220" height="50" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
    <rect x="50" y="305" width="6" height="50" fill="#0D9488" rx="2" />
    <text class="text-box-title" x="70" y="325">03. Freight Shipping Reconciler</text>
    <text class="text-box-sub" x="70" y="340">Weighted allocation algorithm via Python Pandas</text>
  </g>
  <path class="line-arrow" stroke="#3B82F6" d="M 160 355 L 160 380" marker-end="url(#arrow-blue)" />

  <!-- ==================== COLUMN 2: ANALYTICS (BLUE) ==================== -->
  <text class="text-section-title" fill="#2563EB" x="315" y="165">FP&amp;A &amp; VISIBILITY</text>

  <!-- Module 4 -->
  <g filter="url(#shadow)">
    <rect x="315" y="175" width="220" height="50" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
    <rect x="315" y="175" width="6" height="50" fill="#2563EB" rx="2" />
    <text class="text-box-title" x="335" y="195">04. Budget vs. Actual Dashboard</text>
    <text class="text-box-sub" x="335" y="210">Power BI 2-page star-schema model</text>
  </g>
  <path class="line-arrow" stroke="#CBD5E1" d="M 425 225 L 425 240" />

  <!-- Module 5 -->
  <g filter="url(#shadow)">
    <rect x="315" y="240" width="220" height="50" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
    <rect x="315" y="240" width="6" height="50" fill="#2563EB" rx="2" />
    <text class="text-box-title" x="335" y="260">05. P&amp;L Report Automation</text>
    <text class="text-box-sub" x="335" y="275">openpyxl &amp; Windows COM month slicer</text>
  </g>
  <path class="line-arrow" stroke="#CBD5E1" d="M 425 290 L 425 305" />

  <!-- Module 6 -->
  <g filter="url(#shadow)">
    <rect x="315" y="305" width="220" height="50" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
    <rect x="315" y="305" width="6" height="50" fill="#2563EB" rx="2" />
    <text class="text-box-title" x="335" y="325">06. AR Aging Report</text>
    <text class="text-box-sub" x="335" y="340">Color-coded warning bucket pivot sheets</text>
  </g>
  <path class="line-arrow" stroke="#10B981" d="M 425 355 L 425 380" marker-end="url(#arrow-green)" />

  <!-- ==================== COLUMN 3: AUTOMATION (PURPLE) ==================== -->
  <text class="text-section-title" fill="#7C3AED" x="580" y="165">FORECASTS &amp; CLOUD PIPELINES</text>

  <!-- Module 7 -->
  <g filter="url(#shadow)">
    <rect x="580" y="175" width="220" height="50" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
    <rect x="580" y="175" width="6" height="50" fill="#7C3AED" rx="2" />
    <text class="text-box-title" x="600" y="195">07. Seasonal Demand Forecasting</text>
    <text class="text-box-sub" x="600" y="210">statsmodels SARIMA forecasting engine</text>
  </g>
  <path class="line-arrow" stroke="#CBD5E1" d="M 690 225 L 690 240" />

  <!-- Module 8 -->
  <g filter="url(#shadow)">
    <rect x="580" y="240" width="220" height="50" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
    <rect x="580" y="240" width="6" height="50" fill="#7C3AED" rx="2" />
    <text class="text-box-title" x="600" y="260">08. Quote-to-Invoice Pipeline</text>
    <text class="text-box-sub" x="600" y="275">Google Apps Script Drive &amp; Gmail flow</text>
  </g>
  <path class="line-arrow" stroke="#CBD5E1" d="M 690 290 L 690 305" />

  <!-- Module 9 -->
  <g filter="url(#shadow)">
    <rect x="580" y="305" width="220" height="50" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
    <rect x="580" y="305" width="6" height="50" fill="#7C3AED" rx="2" />
    <text class="text-box-title" x="600" y="325">09. Case Study &amp; Proposal</text>
    <text class="text-box-sub" x="600" y="340">Structured PDF summary &amp; Upwork kits</text>
  </g>
  <path class="line-arrow" stroke="#8B5CF6" d="M 690 355 L 690 380" marker-end="url(#arrow-purple)" />

  <!-- ==================== DELIVERABLES (BOTTOM ROW) ==================== -->
  
  <!-- Output 1 -->
  <g filter="url(#shadow)">
    <rect x="50" y="380" width="220" height="36" rx="4" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1" />
    <text class="text-output" fill="#1D4ED8" x="160" y="402" text-anchor="middle">Branded PDF Invoices &amp; Run Logs</text>
  </g>

  <!-- Output 2 -->
  <g filter="url(#shadow)">
    <rect x="315" y="380" width="220" height="36" rx="4" fill="#ECFDF5" stroke="#10B981" stroke-width="1" />
    <text class="text-output" fill="#047857" x="425" y="402" text-anchor="middle">Automated P&amp;L, AR &amp; Tax Workbooks</text>
  </g>

  <!-- Output 3 -->
  <g filter="url(#shadow)">
    <rect x="580" y="380" width="220" height="36" rx="4" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1" />
    <text class="text-output" fill="#6D28D9" x="690" y="402" text-anchor="middle">Power BI Dashboards &amp; Forecasts</text>
  </g>

</svg>
